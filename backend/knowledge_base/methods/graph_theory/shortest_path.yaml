method_card:
  id: "mc_018"
  name: "最短路径与图论算法"
  name_en: "Shortest Path & Graph Theory Algorithms"
  category: ["图论与网络", "优化算法"]
  principle: |
    图论算法解决基于图（节点+边）的路径规划、网络优化等问题。
    核心是最短路径问题：在带权图中寻找从起点到终点的最小总权重路径。

    **Dijkstra 算法**（单源最短路径，非负权）：
    使用优先队列的贪心策略。维护已确定最短距离的节点集合 S 和候选集合。
    每轮选择距离源点最近的未处理节点，更新其邻居的距离。
    时间复杂度 O(E log V)（堆优化）。

    **Floyd-Warshall 算法**（全源最短路径）：
    动态规划方法。dp[k][i][j] = 考虑前 k 个中间节点时 i 到 j 的最短路径。
    空间压缩后：dist[i][j] = min(dist[i][j], dist[i][k] + dist[k][j])。
    时间复杂度 O(V^3)，适合稠密图或需要任意两点间最短路径的场景。

    **其他经典问题**：
    - 最小生成树（Kruskal/Prim）：连接所有节点的最小总成本和树
    - 最大流（Ford-Fulkerson/Dinic）：网络流中的最大传输量
    - 旅行商问题 TSP：访问所有城市回到起点，最短路径（NP-hard）

  formulas:
    - "Dijkstra: dist[v] = min(dist[v], dist[u] + w(u,v))"
    - "Floyd: dist[i][j] = min(dist[i][j], dist[i][k] + dist[k][j])"
    - "最小生成树权值：Σ w(e)，e ∈ MST 的边集合"

  applicable_when:
    - "问题可抽象为节点和带权边的图/网络结构"
    - "路径明确的离散优化问题（非连续优化）"
    - "节点数量适中（Dijkstra ≤ 10^5 节点，Floyd ≤ 500 节点）"
    - "问题涉及连通性、分配、路由等图论概念"

  typical_scenarios:
    - "物流配送：多仓库多目的地的车辆路径规划（VRP）"
    - "交通网络：城市道路最短路径导航"
    - "通信网络：网络布线最小成本、数据路由最优路径"
    - "管道铺设：连接多个节点的最短总长度（最小生成树）"
    - "工序安排：项目关键路径计算（AOE 网）"

  common_mistakes:
    - "边权有负数时使用 Dijkstra（算法失效）；改用 Bellman-Ford"
    - "图太大时用 Floyd 复杂度不够；按需选用 Dijkstra 或 A*"
    - "忽略图是否连通；不连通时需分别处理每个连通分量"
    - "未将实际问题正确建模为图；关键是确定节点定义和边权计算方式"

  code_snippets:
    - |
      # Python: Dijkstra 堆优化实现
      import heapq

      def dijkstra(graph, start):
          \"\"\"graph: 邻接表 {u: [(v, w), ...]}\"\"\"
          dist = {node: float('inf') for node in graph}
          dist[start] = 0
          pq = [(0, start)]
          while pq:
              d, u = heapq.heappop(pq)
              if d > dist[u]: continue
              for v, w in graph.get(u, []):
                  nd = d + w
                  if nd < dist[v]:
                      dist[v] = nd
                      heapq.heappush(pq, (nd, v))
          return dist
    - |
      # Python: Floyd-Warshall 全源最短路径
      def floyd(n, edges):
          \"\"\"n个节点, edges: [(u,v,w),...]\"\"\"
          dist = [[float('inf')]*n for _ in range(n)]
          for i in range(n): dist[i][i] = 0
          for u, v, w in edges: dist[u][v] = min(dist[u][v], w)
          for k in range(n):
              for i in range(n):
                  for j in range(n):
                      dist[i][j] = min(dist[i][j], dist[i][k]+dist[k][j])
          return dist

