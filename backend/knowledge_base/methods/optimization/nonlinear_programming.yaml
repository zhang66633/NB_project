method_card:
  id: "mc_020"
  name: "非线性规划"
  name_en: "Nonlinear Programming (NLP)"
  category: ["优化算法", "数学规划"]
  principle: |
    非线性规划处理目标函数或约束条件中至少有一个是非线性的优化问题。

    **标准形式**：
    min f(x)
    s.t. g_i(x) ≤ 0, i = 1,...,m
         h_j(x) = 0, j = 1,...,p

    其中 f(x) 为非线性目标函数，g_i(x) 为不等式约束，h_j(x) 为等式约束。

    **KKT 条件**（Karush-Kuhn-Tucker）：非线性规划最优解的必要条件。
    ∇f(x*) + Σ λ_i·∇g_i(x*) + Σ μ_j·∇h_j(x*) = 0（拉格朗日函数梯度为零）
    λ_i ≥ 0, λ_i·g_i(x*) = 0（互补松弛条件）
    g_i(x*) ≤ 0, h_j(x*) = 0（原始可行性）

    **求解方法**：
    - 无约束优化：梯度下降、牛顿法、共轭梯度法、BFGS（拟牛顿法）
    - 有约束优化：罚函数法、增广拉格朗日法、序列二次规划(SQP)
    - 全局优化：多起点搜索、模拟退火、遗传算法（参见 mc_006/mc_003）

  formulas:
    - "KKT条件: ∇f + Σλ_i·∇g_i + Σμ_j·∇h_j = 0"
    - "梯度下降: x^{k+1} = x^k - α·∇f(x^k)"
    - "牛顿法: x^{k+1} = x^k - [Hf(x^k)]^{-1}·∇f(x^k)"
    - "Lagrange函数: L(x,λ,μ) = f(x) + Σλ_i·g_i(x) + Σμ_j·h_j(x)"

  applicable_when:
    - "目标函数或约束中包含平方项、指数项、乘积项等非线性项"
    - "变量之间存在交叉耦合（如 x₁·x₂）"
    - "问题规模较小（< 100 变量，否则梯度方法收敛慢）"
    - "线性规划或整数规划无法建模实际情况"

  typical_scenarios:
    - "投资组合优化：收益-风险的非线性权衡（Markowitz 模型）"
    - "参数估计：非线性回归模型的最小二乘拟合"
    - "工程设计：结构重量优化、成本函数为非线性"
    - "生产计划：规模报酬递减/递增导致的非线性成本函数"
    - "化学反应平衡：非线性反应动力学方程求解"

  common_mistakes:
    - "忽视解的局部性：非线性规划可能有多个局部最优解，需全局搜索"
    - "惩罚因子选择不当：过大导致数值不稳定，过小惩罚效果不足"
    - "初始点敏感：不同起始点可能收敛到不同局部解；多起点策略"
    - "忽略了问题可以分段线性化近似：先用线性规划求解，迭代修正"

  code_snippets:
    - |
      # Python: scipy.optimize 求解非线性规划
      from scipy.optimize import minimize
      import numpy as np

      # 目标函数
      def objective(x):
          return x[0]**2 + 2*x[1]**2 - 0.3*np.cos(3*np.pi*x[0])

      # 约束条件
      cons = [
          {'type': 'ineq', 'fun': lambda x: 1 - x[0] - x[1]},  # x0+x1≤1
          {'type': 'ineq', 'fun': lambda x: x[0] + x[1]},       # x0+x1≥0
      ]
      bounds = [(-5, 5), (-5, 5)]

      # 多起点搜索全局最优
      best = None
      for _ in range(20):
          x0 = np.random.uniform(-5, 5, 2)
          res = minimize(objective, x0, method='SLSQP',
                         bounds=bounds, constraints=cons)
          if best is None or res.fun < best.fun:
              best = res
      print(f"最优解: x={best.x}, f={best.fun}")

  related_cards: ["mc_001", "mc_002", "mc_003", "mc_006"]
  difficulty: 3
  quality_rating: 5
  tags:
    model_type: ["最优化"]
    key_concepts: ["KKT条件", "梯度下降", "拉格朗日乘子", "凸优化"]
    mathematical_tools: ["微积分", "矩阵分析", "数值优化"]
