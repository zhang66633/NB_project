method_card:
  id: "mc_014"
  name: "主成分分析"
  name_en: "Principal Component Analysis (PCA)"
  category: ["统计分析", "数据降维"]
  principle: |
    主成分分析是一种线性降维方法，通过正交变换将可能相关的变量转换为
    线性不相关的新变量（主成分），用少数主成分保留原始数据的大部分信息。

    **核心思想**：
    1. 数据中心化：x' = x - μ
    2. 计算协方差矩阵 Σ（或相关系数矩阵）
    3. 对 Σ 做特征值分解，得到特征值 λ_i 和特征向量 v_i
    4. 按特征值从大到小排序，前 k 个主成分的累计贡献率：Σ_{i=1}^k λ_i / Σ_{i=1}^p λ_i
    5. 取累计贡献率 ≥ 85% 的最小 k 值，用前 k 个特征向量构造投影矩阵
    6. 变换到新空间：Y = X · V_k

    **主成分的含义**：第一主成分 = 数据方差最大的方向（信息量最多），
    第二主成分 = 与第一主成分正交且方差次大的方向，以此类推。

  formulas:
    - "累计贡献率：r_k = Σ_{i=1}^k λ_i / Σ_{i=1}^p λ_i ≥ 0.85"
    - "投影变换：Y = X · V_k，V_k 为前 k 个特征向量构成的 p×k 矩阵"
    - "主成分得分：对各样本在新空间中的坐标加权求和"

  applicable_when:
    - "变量数量多（p > 10），存在高度相关（多重共线性）"
    - "希望用少数综合指标代替大量原始指标"
    - "数据近似服从正态分布（PCA 对非正态数据效果可能变差）"
    - "需要可视化高维数据（降到 2-3 维做散点图）"

  typical_scenarios:
    - "综合评价：如城市综合实力排名，用 PCA 降维后取第一主成分得分排序"
    - "特征提取：高维数据预处理，减少后续模型的输入维度"
    - "多重共线性处理：消除回归分析中自变量间的相关性"
    - "数据可视化：将 10+ 维数据投影到 2-3 维做散点图"
    - "图像压缩：对图像数据降维减少存储空间"

  common_mistakes:
    - "未标准化直接求协方差（量纲不同会导致误导性结果）"
    - "保留主成分太少，丢失关键信息；应同时检查累计贡献率和碎石图"
    - "主成分含义模糊时强行解释；可尝试因子分析（FA）获取可解释的因子"
    - "对非线性关系的数据使用 PCA；应考虑 Kernel PCA 或 t-SNE"

  code_snippets:
    - |
      # Python: sklearn PCA 示例
      from sklearn.decomposition import PCA
      from sklearn.preprocessing import StandardScaler
      import numpy as np

      def pca_analysis(X, n_components=None):
          \"\"\"返回降维结果、累计贡献率、各成分权重\"\"\"
          # 1. 标准化
          scaler = StandardScaler()
          X_scaled = scaler.fit_transform(X)
          # 2. PCA
          pca = PCA(n_components=n_components or min(X.shape))
          X_pca = pca.fit_transform(X_scaled)
          # 3. 累计贡献率
          cumsum = np.cumsum(pca.explained_variance_ratio_)
          k = np.argmax(cumsum >= 0.85) + 1  # 取≥85%
          # 4. 综合评价得分
          weights = pca.explained_variance_ratio_[:k]
          scores = (X_pca[:, :k] * weights).sum(axis=1)
          return X_pca[:, :k], cumsum, scores

  related_cards: ["mc_013", "mc_015"]
  difficulty: 3
  quality_rating: 5
  tags:
    model_type: ["统计分析"]
    key_concepts: ["降维", "特征值分解", "方差最大化"]
    mathematical_tools: ["线性代数", "矩阵分解", "统计学"]
