method_card:
  id: "mc_015"
  name: "K-Means 聚类"
  name_en: "K-Means Clustering"
  category: ["分类与聚类", "无监督学习"]
  principle: |
    K-Means 是一种基于距离的划分式聚类算法，将 n 个样本划分为 k 个簇，
    使得簇内样本尽可能相似（距离近），簇间样本尽可能不同（距离远）。

    **算法流程**：
    1. 随机选择 k 个初始聚类中心 μ_1, μ_2, ..., μ_k
    2. **分配步骤**：对每个样本 x_i，计算到各中心的距离，分配到最近簇：
       c_i = argmin_j ||x_i - μ_j||^2
    3. **更新步骤**：对每个簇 j，重新计算中心为簇内样本均值：
       μ_j = (1/|C_j|) · Σ_{x_i∈C_j} x_i
    4. 重复步骤 2-3，直到聚类中心不再变化（或达到最大迭代次数）

    **k 值选择**：常用「肘部法则」（拐点处为最佳 k）或轮廓系数（越接近 1 越好）。
    K-Means++ 改进了初始中心选择策略，显著提升稳定性。

  formulas:
    - "目标函数（最小化）：J = Σ_{j=1}^k Σ_{x_i∈C_j} ||x_i - μ_j||^2"
    - "肘部法则：绘制 J(k) 曲线，取拐点"
    - "轮廓系数：s(i) = (b(i) - a(i)) / max{a(i), b(i)}"

  applicable_when:
    - "类别数 k 已知或可估计（K-Means 需要预先指定 k）"
    - "数据分布近似球状（各簇的形状接近圆形/球形）"
    - "各簇大小相近（对不均匀簇大小不敏感建议用 DBSCAN）"
    - "样本量不太大（> 1000 时建议用 Mini-Batch K-Means）"

  typical_scenarios:
    - "客户分群：消费行为、用户画像的聚类分析"
    - "城市分级：依据经济/人口/环境指标对城市聚类"
    - "图像分割：基于像素颜色进行区域划分"
    - "异常检测：离聚类中心远的不寻常样本识别"
    - "文档聚类：基于 TF-IDF 向量对文本分类"

  common_mistakes:
    - "k 值选错是最大问题；务必结合肘部法则或轮廓系数确定"
    - "未标准化数据导致距离被大数量级指标主导；统一做 z-score 标准化"
    - "初始中心随机导致结果不稳定；使用 K-Means++ 或多次运行取最优"
    - "强行用于非球状数据；应先用 DBSCAN 或层次聚类"

  code_snippets:
    - |
      # Python: sklearn K-Means 示例
      from sklearn.cluster import KMeans
      from sklearn.preprocessing import StandardScaler
      import numpy as np

      def kmeans_clustering(X, k=3):
          scaler = StandardScaler()
          X_scaled = scaler.fit_transform(X)
          model = KMeans(n_clusters=k, init='k-means++', n_init=10,
                         random_state=42)
          labels = model.fit_predict(X_scaled)
          centers = scaler.inverse_transform(model.cluster_centers_)
          # 轮廓系数
          from sklearn.metrics import silhouette_score
          score = silhouette_score(X_scaled, labels) if k > 1 else 0
          return labels, centers, score

  related_cards: ["mc_014", "mc_016"]
  difficulty: 2
  quality_rating: 5
  tags:
    model_type: ["分类与聚类"]
    key_concepts: ["无监督学习", "距离度量", "迭代优化"]
    mathematical_tools: ["欧氏距离", "均值", "迭代收敛"]
