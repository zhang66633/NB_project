template:
  id: "tpl_optimization"
  name: "优化问题分析框架"
  applicable_to: ["optimization", "调度问题", "分配问题", "资源规划"]

  steps:
    - step: 1
      name: "问题识别与分类"
      guiding_questions:
        - "需要优化的目标是什么？（最大化利润/最小化成本/最短时间？）"
        - "决策变量有哪些？它们的物理意义是什么？"
        - "存在哪些约束条件？（资源限制/时间限制/逻辑约束？）"
        - "目标函数和约束是线性还是非线性？"
      checklist:
        - "明确写出目标函数的方向（max/min）"
        - "列出所有决策变量及其物理意义"
        - "确认约束条件是否完整"

    - step: 2
      name: "模型分类决策"
      guiding_questions:
        - "变量是连续的还是离散的？"
        - "目标函数是单目标还是多目标？"
        - "是否存在随机因素？"
        - "问题规模大概有多大？（变量数/约束数）"
      decision_tree:
        - "所有函数线性 + 变量连续 → 线性规划 (LP)"
        - "所有函数线性 + 变量含整数 → 混合整数规划 (MIP)"
        - "目标/约束非线性 + 凸性 → 凸优化"
        - "目标/约束非线性 + 非凸 → 启发式算法 (GA/SA/PSO)"
        - "多阶段决策 + 后效性 → 动态规划 (DP)"
        - "多个目标需同时优化 → 多目标优化 (NSGA-II/加权求和)"

    - step: 3
      name: "模型建立"
      guiding_questions:
        - "如何用数学符号表达目标函数？"
        - "每个约束条件的数学表达式是什么？"
        - "有哪些合理的假设可以简化模型？"
      checklist:
        - "写出目标函数的完整数学表达式（含求和/积分符号）"
        - "列出所有约束条件的数学表达式（等式/不等式）"
        - "标注每个参数和变量的范围与物理意义"
        - "明确模型假设，便于后续验证其合理性"

    - step: 4
      name: "求解与验证"
      guiding_questions:
        - "选择什么求解器或算法？为什么？"
        - "如何验证模型的正确性？（小规模算例/特殊情形？）"
        - "关键参数变化时，结果如何变化？（灵敏度分析）"
      checklist:
        - "用一个小规模算例手动验证模型逻辑"
        - "进行灵敏度分析：改变关键参数，观察结果变化"
        - "检查模型的鲁棒性：放松假设后模型是否仍然有效"
        - "对比其他建模方法的优劣"
