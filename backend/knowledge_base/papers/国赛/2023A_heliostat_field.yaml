paper:
  id: "paper_002"
  year: 2023
  competition: "国赛"
  problem_id: "A"
  title: "定日镜场优化设计"
  tags:
    problem_type: ["优化"]
    core_models: ["光学反射模型", "非线性规划", "网格搜索", "模拟退火"]
    data_requirement: ["given_data"]
  difficulty: 4
  analysis:
    background: |
      构建塔式太阳能光热电站的定日镜场。每个定日镜将太阳光反射到集热塔顶的吸收器上，
      需优化定日镜的位置、尺寸、安装高度等参数，在满足额定功率输出的前提下，
      使单位镜面面积的年均输出功率最大化。

    key_insights:
      - "核心是将物理几何关系（阳光入射→镜面反射→吸收器）建模为光学效率函数"
      - "光学效率 = 阴影遮挡效率 × 余弦效率 × 大气透射率 × 截断效率"
      - "多个效率因子之间存在耦合，不能独立优化"
      - "年输出功率需要对全年的太阳位置做积分/求和"

    decomposition:
      - name: "光学模型建立"
        description: "推导镜面法向量、入射光方向、反射光方向的空间几何关系"
        sub_models: ["坐标系建立", "太阳位置计算（天球坐标→直角坐标）", "镜面反射公式"]
      - name: "光学效率计算"
        description: "逐一建立四个效率因子的数学模型"
        sub_models:
          - "阴影遮挡效率：相邻定日镜对入射/反射光的遮挡判断"
          - "余弦效率：入射光与镜面法线夹角 cosθ"
          - "大气透射率：光线传播距离的指数衰减"
          - "截断效率：反射光斑与吸收器开口的几何关系"
      - name: "定日镜场布局优化"
        description: "确定各定日镜的位置坐标和参数，使年均输出最大化"
        sub_models: ["辐射网格布局", "优化变量编码", "非线性规划/启发式搜索"]
      - name: "年均输出计算"
        description: "在全年时间维度上积分光学效率，计算加权总输出"
        sub_models: ["时间离散化（每月/每日典型时刻）", "太阳位置查表", "功率加权求和"]

    solution_framework: |
      1. **坐标建模**：以集热塔底部为原点，正东为 x 轴，正北为 y 轴，天顶为 z 轴
      2. **光学效率链式模型**：η = η_sb × η_cos × η_at × η_trunc
      3. **场布局**：采用辐射交错网格，以环半径 r 和方位角间隔 Δθ 为优化变量
      4. **优化模型**：max 年均输出功率，s.t. 镜面不重叠、不超出场地范围
      5. **求解**：网格搜索 + 模拟退火混合策略，网格粗搜出可行域 → SA 精细调优

  model:
    methodology: |
      建立了从太阳光线到集热器能量的完整光学—热学链路模型。
      光学子模型采用向量法推导镜面反射几何关系，计算入射余弦损失和阴影遮挡损失；
      热学子模型将半功率角度扩展下的光斑能量分布用高斯近似，积分求出截断效率。

    innovations:
      - "辐射网格 + 高度分层：在极坐标系下同时优化径向间距和安装高度，实现三维场布局"
      - "效率因子链式耦合：将四个效率因子表达为镜面参数的函数，建立端到端的目标函数"
      - "网格粗搜→SA精调的混合策略：兼顾全局搜索能力和局部收敛精度"
      - "年均计算使用典型日代表月的方法，在精度和计算量之间取得平衡"

    formulas:
      - "余弦效率: η_cos = cosβ = n̂·ŝ，其中 n̂ 为镜面法向量，ŝ 为阳光入射方向"
      - "大气透射率: η_at = exp(-α·d)，d 为光线从镜面到吸收器的距离"
      - "截断效率: η_trunc = ∫_{|r|<R_a} I(r) dr / ∫ I(r) dr"

  evaluation:
    strengths:
      - "模型有清晰的物理基础，每个效率因子都可物理解释"
      - "分层优化的策略使问题维度可控（粗搜→精调）"
      - "充分考虑了全年不同时刻的太阳位置变化"
    weaknesses:
      - "光学模型未考虑大气湍流和镜面制造误差等随机因素"
      - "网格搜索在高维空间效率较低，可进一步用 PSO 或贝叶斯优化"
      - "未对多目标（成本/功率/占地面积）做 Pareto 分析"
    improvement_ideas:
      - "引入贝叶斯优化替代网格搜索，提升搜索效率"
      - "考虑风速对镜面晃动的影响（随机优化）"
      - "多目标优化：用 NSGA-II 同时优化功率和建造成本"

  takeaways:
    - "物理—数学—优化的链路建模是工科赛题的通用范式"
    - "复合优化问题分阶段处理：先粗后精，先全局后局部"
    - "连续函数优化用坐标重参数化简化约束（如极坐标替代笛卡尔坐标）"
