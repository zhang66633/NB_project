method_card:
  id: "mc_016"
  name: "BP 神经网络"
  name_en: "Backpropagation Neural Network (BPNN)"
  category: ["预测与分类", "机器学习"]
  principle: |
    BP 神经网络是一种多层前馈神经网络，通过误差反向传播算法训练。
    网络由输入层、隐藏层（1层或多层）和输出层组成，层间全连接，
    每个连接有一个权重，每个神经元有一个偏置。

    **前向传播**：输入信号从输入层经隐藏层逐层处理，传向输出层。
    隐藏层输出：h = f(W1·x + b1)
    输出层输出：y = g(W2·h + b2)
    其中 f 为激活函数（常用 Sigmoid/Tanh/ReLU）。

    **反向传播**：
    1. 计算输出误差：δ = (y_true - y_pred) · g'(W2·h + b2)
    2. 误差从输出层反向传播到隐藏层：δ_h = W2^T·δ · f'(W1·x + b1)
    3. 梯度下降更新权值：W = W + η · δ · (前一层的输出)

    在数学建模中，BPNN 通常配置为 3 层结构（单隐藏层），
    隐藏层节点数用经验公式或试凑法确定。

  formulas:
    - "前向：h = f(W1·x + b1)，y = g(W2·h + b2)"
    - "MSE 损失：E = (1/n)·Σ(y_pred - y_true)^2"
    - "权值更新：ΔW = -η · ∂E/∂W"
    - "隐藏层节点数：m = sqrt(n_input + n_output) + a, a∈[1,10]"

  applicable_when:
    - "输入输出之间存在复杂非线性关系"
    - "有足够的训练数据（样本数 > 10× 网络参数数）"
    - "传统回归/分类模型（如线性回归、逻辑回归）效果不佳"
    - "对模型可解释性要求不高"

  typical_scenarios:
    - "非线性函数拟合：复杂工程曲线的逼近"
    - "分类预测：如故障诊断、疾病预测、信用评估"
    - "时间序列预测：用水量、电力负荷、股票趋势（需滑动窗口构造监督学习）"
    - "模式识别：手写数字、语音识别的基础网络"
    - "组合预测：与 ARIMA 等其他模型集成"

  common_mistakes:
    - "数据未归一化导致梯度消失/爆炸；统一归一化到 [-1,1] 或 [0,1]"
    - "隐藏层节点数过多导致过拟合；用早停法或正则化"
    - "学习率过大导致震荡不收敛；建议从 0.01 开始逐步调整"
    - "训练集/测试集划分不合理导致评估失真；保留 20-30% 测试数据"

  code_snippets:
    - |
      # Python: PyTorch BP 网络示例
      import torch
      import torch.nn as nn

      class BPNN(nn.Module):
          def __init__(self, input_dim, hidden_dim, output_dim):
              super().__init__()
              self.net = nn.Sequential(
                  nn.Linear(input_dim, hidden_dim),
                  nn.ReLU(),
                  nn.Linear(hidden_dim, output_dim),
              )
          def forward(self, x):
              return self.net(x)

      # 训练
      model = BPNN(10, 20, 1)
      criterion = nn.MSELoss()
      optimizer = torch.optim.Adam(model.parameters(), lr=0.01)
      for epoch in range(200):
          pred = model(X_train)
          loss = criterion(pred, y_train)
          optimizer.zero_grad()
          loss.backward()
          optimizer.step()

  related_cards: ["mc_017", "mc_004"]
  difficulty: 3
  quality_rating: 4
  tags:
    model_type: ["预测与分类"]
    key_concepts: ["反向传播", "梯度下降", "激活函数", "多层感知机"]
    mathematical_tools: ["链式求导", "梯度下降", "矩阵乘法"]
