paper:
  id: "paper_003"
  year: 2021
  competition: "美赛"
  problem_id: "F"
  title: "政策制定模型：高等教育体系评估与改进"
  tags:
    problem_type: ["评价决策", "优化"]
    core_models: ["AHP", "TOPSIS", "DEA", "系统动力学"]
    data_requirement: ["self_collect"]
  difficulty: 4
  analysis:
    background: |
      MCM 2021 F 题要求构建一个评估国家高等教育系统健康状况的模型，
      并提出改进政策。需要综合考虑教育公平、质量、就业、科研产出等多维度指标，
      设计一个可量化、可比较、支持「what-if」政策模拟的评估体系。

    key_insights:
      - "高等教育系统是复杂的多指标多目标系统，单个指标无法全面评价"
      - "指标间存在相互制约关系（如扩招vs质量），需要做 Trade-off 分析"
      - "不同国家发展阶段不同，评价标准和改进方向应有差异"
      - "政策效果预测需要动态模型（系统动力学/多智能体仿真）"

    decomposition:
      - name: "指标体系构建"
        description: "从公平、质量、效率三个维度选取可量化评价指标"
        sub_models: ["文献调研+专家打分确定指标", "指标量化方法定义", "正负向指标区分"]
      - name: "综合评价模型"
        description: "多方法交叉验证，确保排名稳健性"
        sub_models: ["AHP确定主观权重", "熵权法确定客观权重", "组合权重TOPSIS排序"]
      - name: "效率分析模型"
        description: "分析各国教育投入产出效率"
        sub_models: ["DEA(CCR+BCC) 效率分析", "规模报酬分析", "投入产出冗余识别"]
      - name: "政策模拟与建议"
        description: "在模型中调整参数模拟政策效果"
        sub_models: ["灵敏度分析方法", "情景分析（乐观/基准/悲观）", "对标分析（向标杆国家看齐）"]

    solution_framework: |
      1. **指标体系**：构建三级指标体系（目标层→准则层(公平/质量/效率)→指标层(12个量化指标)）
      2. **综合评价**：AHP+熵权法组合赋权 → TOPSIS 计算得分 → 排名
      3. **效率分析**：DEA CCR/BCC 模型评估投入产出效率，识别明显低效国家
      4. **政策模拟**：每次调整某个或某组指标值，观察对排名的影响（灵敏度分析）
      5. **建议生成**：基于对标分析，为排名靠后的国家提供改进路径

  model:
    methodology: |
      采用「综合评价+效率诊断」的双轨分析框架。综合评价层面，
      用 AHP-熵权法组合赋权避免单一赋权方法的偏差，TOPSIS
      提供直观的排序结果。效率诊断层面，用 DEA 排除规模效应，
      定位是技术效率低还是规模效率低。最后通过灵敏度分析和
      情景模拟验证政策建议的有效性。

    innovations:
      - "组合赋权：融合主观专家经验(AHP)和客观数据规律(熵权)，增强结果说服力"
      - "双轨验证：TOPSIS排名 + DEA效率分析，从不同角度交叉验证"
      - "灵敏度驱动的政策建议：不直接给出最优政策，而是分析'改哪个指标效果最大'"
      - "对标分析的层次：不仅排名，还指出'向谁学'和'学什么'"

    formulas:
      - "组合权重: w_i = α·w_i_AHP + (1-α)·w_i_熵权, α=0.5"
      - "TOPSIS 相对贴近度: C_i = d_i^- / (d_i^+ + d_i^-)"
      - "DEA效率: θ_k = Σ u_r·y_rk / Σ v_i·x_ik"

  evaluation:
    strengths:
      - "多方法交叉验证，结果稳健性强"
      - "政策建议有数据支撑，不止于排名"
      - "指标体系的构建逻辑清晰可追溯"
    weaknesses:
      - "AHP 专家打分受主观影响，未做一致性检验"
      - "DEA 要求 DMU 数量 ≥ 2×(输入+输出)，小样本时区分度有限"
      - "政策模拟仅做灵敏度分析，缺少动态演化机制"
    improvement_ideas:
      - "引入系统动力学(SD)模型做动态政策仿真"
      - "用模糊综合评价处理定性指标"
      - "补充机器学习模型（随机森林）做指标重要性分析"

  takeaways:
    - "评价类问题至少用两种以上方法交叉验证（如 AHP/熵权法/TOPSIS/DEA/灰色关联）"
    - "数据收集是最大的隐性工作，指标选取要兼顾代表性和可获得性"
    - "灵敏度分析让静态模型有了'政策模拟'的味道，是评价题拿高分的技巧"
    - "指标构建要有层次（目标→准则→指标），有逻辑（公平/质量/效率等维度）"
