method_card:
  id: "mc_005"
  name: "灰色预测 (Grey Prediction)"
  category: ["prediction", "时间序列", "小样本"]
  principle: |
    灰色系统理论中的预测方法，核心是GM(1,1)模型。通过对原始数据做一次累加(AGO)生成规律性更强的序列，
    再用微分方程拟合，最后累减还原(IAGO)得到预测值。适用于贫信息、小样本场景。
  applicable_when:
    - "样本量很小（4-10个数据点）"
    - "数据呈指数增长或递减趋势"
    - "信息不完全（部分数据未知或缺失）"
  not_applicable_when:
    - "数据量大且波动剧烈（此时神经网络等方法更合适）"
    - "数据没有明显趋势"
  typical_scenarios:
    - "中国人口增长预测（经典应用）"
    - "新产品销量初期预测"
    - "环境指标趋势预测"
  code_snippets:
    - language: "python"
      description: "使用 numpy 实现 GM(1,1)"
      code: |
        import numpy as np

        def gm11(x0):
            x1 = np.cumsum(x0)  # 一次累加
            z1 = (x1[:-1] + x1[1:]) / 2.0  # 紧邻均值
            B = np.column_stack((-z1, np.ones_like(z1)))
            Y = x0[1:]
            u = np.linalg.lstsq(B, Y, rcond=None)[0]
            a, b = u  # 发展系数, 灰作用量
            return lambda k: (x0[0] - b/a) * np.exp(-a*k) + b/a
  common_mistakes:
    - "原始数据不是非负的：GM(1,1)要求原始数据非负，若负值需平移处理"
    - "数据未做级比检验：级比 σ(k)=x(k-1)/x(k) 应在 (e^{-2/(n+1)}, e^{2/(n+1)}) 范围内，否则需做平移变换"
    - "外推预测步数过多：灰色预测适合短期预测，外推超过样本数的 1/2 时精度急剧下降"
    - "数据波动大时强行使用：波动数据应先做缓冲算子或改用 DGM(2,1) 等改进模型"
  related_cards: ["mc_004"]
  difficulty: 2
  quality_rating: 4
  tags:
    model_type: ["预测与分类"]
    key_concepts: ["灰色系统", "小样本", "累加生成", "指数拟合"]
    mathematical_tools: ["微分方程", "最小二乘", "累加/累减"]
