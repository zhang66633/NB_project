paper:
  id: "paper_001"
  year: 2023
  competition: "国赛"
  problem_id: "C"
  title: "蔬菜类商品的自动定价与补货决策"
  tags:
    problem_type: ["优化", "预测", "评价"]
    core_models: ["线性回归", "ARIMA", "多目标规划", "蒙特卡洛"]
    data_requirement: ["given_data"]
  difficulty: 3
  analysis:
    background: |
      商超需对生鲜蔬菜类商品做自动定价与补货决策。给定各蔬菜品类（6大品类、108个单品）
      的历史销售流水数据，含日期、销量、售价、进货价、损耗率等信息。蔬菜保质期短，
      需要平衡销量最大化与损耗最小化。

    key_insights:
      - "蔬菜品类间存在互补/替代关系（如叶菜vs根茎），定价不能孤立考虑"
      - "销量与售价的关系非简单线性：高价可能降低销量但也提高单品利润"
      - "损耗率与保鲜时间强相关，周末/节假日因客流高峰损耗率更低"
      - "补货量需同时考虑预测量和损耗量：补货量 = 预测量 + 安全库存 - 期初库存"

    decomposition:
      - name: "数据预处理与特征工程"
        description: "清洗销售流水数据，提取品类级和单品级特征"
        sub_models: ["缺失值处理（节假日/盘点日无销售记录）", "异常值检测（促销日销量异常）", "品类间相关性分析（热力图+相关系数矩阵）"]
      - name: "销量预测模型"
        description: "建立各品类日销量预测模型"
        sub_models: ["ARIMA 捕捉时间趋势", "线性回归+品类交叉项捕捉替代效应", "组合预测（加权平均ARIMA+回归的结果）"]
      - name: "定价优化模型"
        description: "以利润最大化为目标确定最优定价"
        sub_models: ["需求函数：Q = a - b·P（线性弹性模型）", "利润函数：π = (P - C)·min(Q, S) - L·loss（S为销售量，L为损耗成本）", "多品类联合定价约束（总销售额目标、价格区间）"]
      - name: "补货决策模型"
        description: "基于预测和定价结果确定补货量"
        sub_models: ["补货量 = 预测需求量 + 安全库存 - 期初库存 + 预期损耗", "蒙特卡洛仿真模拟需求波动对补货方案的影响"]

    solution_framework: |
      1. **数据清洗**：去除异常记录，按品类和日期聚合销量/售价/损耗
      2. **销量预测**：ARIMA(单品类时间序列) + 线性回归(含品类交叉项) → 加权组合预测
      3. **需求函数**：回归拟合 Q = f(P, 星期几, 品类类型) → 弹性系数
      4. **定价优化**：多品类联合定价（考虑替代关系），max Σ 品类利润
      5. **补货方案**：预测量 + 安全库存缓冲 → 各品类补货量 → 总成本

  model:
    methodology: |
      两阶段建模：预测阶段用 ARIMA 和回归的组合模型预测日销量；
      优化阶段建立多品类联合定价模型，用蒙特卡洛仿真验证补货方案的鲁棒性。
      关键创新在于将品类间的替代/互补关系量化为回归模型的交叉项系数，
      使优化模型能够捕捉定价调整对相关品类销量的间接影响。

    innovations:
      - "品类交叉项系数：在回归模型中引入品类销售量的交叉项，捕捉替代/互补效应"
      - "损耗率时间依赖：将损耗率建模为时间的函数（高客流时段损耗更低）"
      - "蒙特卡洛鲁棒性验证：对最优补货方案做 10,000 次仿真，评估缺货概率和损耗率分布"
      - "组合预测降低单模型偏差"

    formulas:
      - "需求函数: Q_i = a_i - b_i·P_i + Σ_{j≠i} c_{ij}·P_j"
      - "利润函数: π_i = (P_i - C_i)·min(Q_i, S_i) - L_i·(S_i - min(Q_i, S_i)+)"
      - "组合预测: Q̂ = α·Q̂_ARIMA + (1-α)·Q̂_regression"

  evaluation:
    strengths:
      - "两阶段建模逻辑清晰，预测和优化解耦降低复杂度"
      - "考虑了品类间交叉影响，比独立建模更贴近实际"
      - "蒙特卡洛仿真验证了方案的鲁棒性"
    weaknesses:
      - "需求函数假设线性弹性，实际蔬菜需求可能非对称（涨价降销快，降价增销慢）"
      - "未考虑节假日/促销日等特殊时段的销量规律突变"
      - "未对蔬菜品质分级做差异化定价"
    improvement_ideas:
      - "引入非线性需求函数（如 log-linear 模型）"
      - "对特殊日期单独建模（节假日虚拟变量）"
      - "建设动态定价机制，根据当日库存实时调价"

  takeaways:
    - "生鲜品类的核心成本不是进货价，是损耗——忽略损耗的定价模型脱离实际"
    - "组合预测（ARIMA+回归）比单一模型更稳健，是数模的常用提分技巧"
    - "多品类联合定价的关键是量化交叉弹性——不是所有定价问题都互相独立"
    - "蒙特卡洛在某方案上仿真比在优化中嵌入随机变量更实用——先优化再验证"

  source: "2023年全国大学生数学建模竞赛C题优秀论文"
  quality_rating: 4
