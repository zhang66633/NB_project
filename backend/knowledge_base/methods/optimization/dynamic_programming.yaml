method_card:
  id: "mc_007"
  name: "动态规划"
  name_en: "Dynamic Programming (DP)"
  category: ["优化算法", "数学规划"]
  principle: |
    动态规划将复杂问题分解为相互关联的子问题，通过存储子问题的解避免重复计算，
    自底向上（或记忆化递归自顶向下）地构建原始问题的最优解。

    **适用条件 — 最优子结构 + 重叠子问题**：
    1. 最优子结构：原问题的最优解包含子问题的最优解
    2. 重叠子问题：子问题的解被多次重复使用

    **核心组件 — 状态、决策、状态转移、边界**：
    - **状态**：描述子问题的变量组合（如 dp[i] 或 dp[i][j]）
    - **决策**：从当前状态到下一状态的选择
    - **状态转移方程**：dp[当前] = f(dp[前一状态], 决策)
    - **边界条件**：最小的子问题的解（如 dp[0] = 0）

    **两种实现**：
    - 自底向上（递推）：从最小子问题开始，逐步计算到大问题。通常用循环
    - 自顶向下（记忆化递归）：从大问题递归到子问题，用字典/数组缓存结果

    DP 是无后效性的：未来的决策不受过去决策的影响（已知当前状态后）。

  formulas:
    - "0-1背包: dp[i][w] = max(dp[i-1][w], dp[i-1][w-w_i] + v_i)"
    - "最长公共子序列: dp[i][j] = dp[i-1][j-1]+1(相同) / max(dp[i-1][j], dp[i][j-1])(不同)"
    - "编辑距离: dp[i][j] = min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost)"

  applicable_when:
    - "问题可分解为有依赖关系的子问题（最优子结构）"
    - "子问题被反复用到（重叠子问题，否则分治法即可）"
    - "决策具有无后效性（马尔可夫性）"
    - "状态空间不太大（通常 < 10^6 个状态）"

  typical_scenarios:
    - "背包问题变体：项目/投资选择、资源分配"
    - "最短路径：多阶段图的最短路径（Bellman 方程）"
    - "序列比对：DNA序列、文本相似度（编辑距离/Needleman-Wunsch）"
    - "排产调度：多工序加工的最优时间安排"
    - "数模竞赛中的资源配置、应急调度、多阶段决策"

  common_mistakes:
    - "问题没有重叠子问题时强行 DP（如二分查找），徒增复杂度"
    - "状态定义错误：状态应该'完全描述子问题所需的所有信息'"
    - "遗漏边界条件：dp[0] 或 dp[-1] 未初始化导致索引越界"
    - "状态转移方程维度爆炸：检查是否可以用滚动数组/状态压缩优化空间"
    - "误认为可以处理连续决策：DP 要求状态空间离散可枚举"

  code_snippets:
    - |
      # Python: 0-1背包 (自底向上 + 滚动数组优化)
      def knapsack(weights, values, capacity):
          n = len(weights)
          dp = [0] * (capacity + 1)  # 一维滚动数组
          for i in range(n):
              # 倒序遍历（防止重复使用）
              for w in range(capacity, weights[i] - 1, -1):
                  dp[w] = max(dp[w], dp[w - weights[i]] + values[i])
          return dp[capacity]
    - |
      # Python: 编辑距离 (Levenshtein距离)
      def edit_distance(s1, s2):
          m, n = len(s1), len(s2)
          dp = [[0]*(n+1) for _ in range(m+1)]
          for i in range(m+1): dp[i][0] = i  # 删除
          for j in range(n+1): dp[0][j] = j  # 插入
          for i in range(1, m+1):
              for j in range(1, n+1):
                  cost = 0 if s1[i-1] == s2[j-1] else 1
                  dp[i][j] = min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost)
          return dp[m][n]

  related_cards: ["mc_001", "mc_003", "mc_018"]
  difficulty: 3
  quality_rating: 5
  tags:
    model_type: ["最优化"]
    key_concepts: ["最优子结构", "重叠子问题", "状态转移", "记忆化"]
    mathematical_tools: ["递推", "组合数学", "最短路径"]
