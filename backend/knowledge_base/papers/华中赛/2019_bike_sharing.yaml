paper:
  id: "paper_005"
  year: 2019
  competition: "华中赛"
  problem_id: "-"
  title: "共享单车需求预测与调度优化"
  tags:
    problem_type: ["预测与分类", "优化"]
    core_models: ["ARIMA", "BP神经网络", "最短路径", "遗传算法"]
    data_requirement: ["given_data"]
  difficulty: 3
  analysis:
    background: |
      共享单车运营面临潮汐需求问题：早晚高峰地铁站周边需求激增，但车辆分布不均。
      需要预测各站点的单车需求量和车辆余量，结合实际调度能力制定最优的车辆
      调配方案，使调度成本最小的同时满足最大用户需求。

    key_insights:
      - "问题有强时空属性：空间上各站点需求不同，时间上有早晚高峰潮汐规律"
      - "需求预测是调度优化的前提，需先预测再优化"
      - "调度问题本质是带时间窗的车辆路径问题(VRPTW)"
      - "多个优化目标存在冲突：成本最小 vs 用户满意度最大"

    decomposition:
      - name: "时空需求预测"
        description: "基于历史订单数据预测各站点未来时段需求"
        sub_models: ["ARIMA预测单点时间序列", "BPNN捕捉多站点空间关联", "天气/工作日等外部因素编码"]
      - name: "站点状态评估"
        description: "基于预测需求评估各站点车辆的供需缺口"
        sub_models: ["需求-供给缺口 = 预测需求量 - 当前存车量", "站点优先级分级（缺口越大优先级越高）"]
      - name: "车辆调度优化"
        description: "规划调度车辆的最优路径和装卸策略"
        sub_models: ["VRPTW建模（考虑道路时间窗+站点服务时间）", "遗传算法求解", "多目标: min成本 + max满足率"]
      - name: "动态再平衡策略"
        description: "考虑实时反馈的自适应调度策略"
        sub_models: ["滚动窗策略: 每30分钟基于最新数据重新优化", "触发式调度: 站点饱和度超阈值自动派车"]

    solution_framework: |
      1. **预测阶段**：ARIMA预测时间趋势 + BPNN补充空间关联和外部因素 → 每个站点每小时的预测需求
      2. **缺口分析**：预测需求 - 当前库存 → 亏车站(调入)和盈车站(调出)
      3. **路径优化**：构建VRPTW模型 → 遗传算法求解调度方案(访问顺序+装卸量)
      4. **方案输出**：输出调度车辆的行驶路径和各站点的取/放量

  model:
    methodology: |
      采用「预测+优化」的两阶段架构。预测层使用 ARIMA 和 BP 神经网络
      的集成模型，提高鲁棒性。优化层将调度问题转化为 VRPTW，用遗传算法
      在合理的调度方案空间中搜索。

    innovations:
      - "ARIMA+BPNN 的集成策略：分别捕捉线性和非线性模式"
      - "将调度抽象为 VRPTW 而不是简单 TSP，更贴近实际约束"
      - "滚动窗策略让静态模型有了动态调节能力"
      - "多目标优化兼顾成本和服务质量"

    formulas:
      - "ARIMA(p,d,q) 已在上文给出"
      - "VRPTW 目标: min Σc_ij·x_ij + α·Σ(未满足需求)"
      - "遗传算法适应度: 1/(总成本 + 罚函数)"

  evaluation:
    strengths:
      - "预测+优化两阶段分工清晰"
      - "VRPTW 建模比朴素 TSP 更贴近实际"
      - "多模型集成提高预测鲁棒性"
    weaknesses:
      - "ARIMA和BPNN简单集成，未做Stacking"
      - "遗传算法求解质量依赖编码设计和参数"
      - "忽略了季节性和特殊事件（节假日/雨天）"
    improvement_ideas:
      - "用LSTM替代ARIMA处理长程依赖"
      - "用强化学习做动态调度决策"
      - "加入天气/活动等外部特征提升预测精度"

  takeaways:
    - "预测+优化是时空问题的经典解题范式"
    - "单目标模型评估容易，多目标需要做 Trade-off 或 Pareto 分析"
    - "实际问题比数学模型复杂得多（天气、节假日、道路管制），建模时需说明简化假设"
    - "VRPTW 是调度类问题的核心模型，需掌握其编码和求解方法"
