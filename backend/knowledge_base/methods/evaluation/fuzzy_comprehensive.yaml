method_card:
  id: "mc_012"
  name: "模糊综合评价法"
  name_en: "Fuzzy Comprehensive Evaluation"
  category: ["评价决策", "模糊数学"]
  principle: |
    模糊综合评价法利用模糊数学的隶属度理论，把定性评价转化为定量评价，解决模糊的、难以量化的问题。

    **核心步骤**：
    1. 建立因素集 U = {u1, u2, ..., un}，即评价指标集合
    2. 建立评语集 V = {v1, v2, ..., vm}，即评价等级集合（如：优/良/中/差）
    3. 确定权重向量 A = [a1, a2, ..., an]，各指标的相对重要性
    4. 构造模糊评价矩阵 R（n×m），Rij = 指标i属于等级j的隶属度
    5. 合成运算 B = A · R（「·」可取 M(∧,∨)、M(·,∨)、M(·,⊕) 等算子）
    6. 按最大隶属度原则或加权平均判决

    **权重的确定**常结合层次分析法（AHP）或熵权法。

  formulas:
    - "B = A · R，其中 A 为权重向量，R 为评价矩阵"
    - "隶属度函数：梯形分布 μ(x) = (x-a)/(b-a)[a≤x<b]; 1[b≤x<c]; (d-x)/(d-c)[c≤x<d]; 0[else]"
    - "最大隶属度原则：取 max(B_i) 对应的评语等级"

  applicable_when:
    - "评价指标难以精确量化（如服务质量、教学水平）"
    - "评价结果需要分级（优/良/中/差）而非精确数值"
    - "各评价指标之间存在模糊边界"
    - "评价对象数量适中，指标数 < 20"

  typical_scenarios:
    - "环境质量评价：大气、水质、土壤污染等级评定"
    - "教学质量评估：教师授课水平综合评价"
    - "方案比选：多个候选方案的综合优劣排序"
    - "风险等级评定：地质灾害风险、金融信用评级"
    - "产品/服务满意度调查分析"

  common_mistakes:
    - "隶属度函数选取不当导致评价失真；需结合专业经验选择函数类型"
    - "权重确定过于随意；建议结合 AHP 或熵权法等客观方法"
    - "对所有指标简单平均分配权重，忽略指标间重要性差异"
    - "评价等级过多（>7个）导致区分度下降；建议 3-5 个等级"

  code_snippets:
    - |
      # Python: 模糊综合评价示例
      import numpy as np

      # 评价矩阵 R (n个指标 × m个等级)
      R = np.array([
          [0.3, 0.4, 0.2, 0.1],  # 指标1
          [0.1, 0.3, 0.4, 0.2],  # 指标2
          [0.2, 0.5, 0.2, 0.1],  # 指标3
      ])
      # 权重向量
      A = np.array([0.35, 0.40, 0.25])
      # M(·,⊕) 算子：加权平均
      B = A @ R  # [0.195, 0.385, 0.28, 0.14]
      # 最大隶属度判决
      grades = ["优", "良", "中", "差"]
      result = grades[np.argmax(B)]  # "良"

  related_cards: ["mc_008", "mc_013"]
  difficulty: 2
  quality_rating: 4
  tags:
    model_type: ["评价类"]
    key_concepts: ["隶属度", "模糊集", "定性转定量"]
    mathematical_tools: ["矩阵运算", "模糊数学"]
