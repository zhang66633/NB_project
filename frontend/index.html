<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathModelAgent - 数学建模智能体</title>
    <meta name="description" content="基于 LangGraph 多智能体的数学建模辅助系统,支持教学引导与方案输出双模式" />

    <!-- 防暗色闪烁:在应用挂载前根据 localStorage/system 决定主题 -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored ? stored === "dark" : prefersDark;
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Google Fonts: Geist Sans(正文) + Newsreader(衬线标题) + JetBrains Mono(代码) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
