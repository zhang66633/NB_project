method_card:
  id: "mc_004"
  name: "ARIMA 时间序列预测"
  name_en: "ARIMA Time Series Forecasting"
  category: ["预测与分类", "时间序列分析"]
  principle: |
    ARIMA（自回归移动平均）是经典的单变量时间序列预测模型，通过捕捉数据自身的
    历史依赖关系来预测未来。模型由三个组件组成：

    - **AR(p) — 自回归**：当前值 = 过去 p 个值的线性组合 + 噪声
      y_t = φ_1·y_{t-1} + φ_2·y_{t-2} + ... + φ_p·y_{t-p} + ε_t
    - **I(d) — 差分**：对非平稳序列做 d 阶差分使之平稳
      Δy_t = y_t - y_{t-1}（一阶差分），Δ^2 y_t = Δ(Δy_t)（二阶差分）
    - **MA(q) — 移动平均**：当前值 = 过去 q 个预测误差的线性组合 + 当前误差
      y_t = ε_t + θ_1·ε_{t-1} + θ_2·ε_{t-2} + ... + θ_q·ε_{t-q}

    **建模流程（Box-Jenkins 方法论）**：
    1. 绘制时序图，观察趋势/季节性/异常值
    2. 平稳性检验（ADF 单位根检验）：不平稳则差分直到平稳
    3. 画 ACF 和 PACF 图，初步确定 p, q：
       - ACF 拖尾 + PACF p 阶截尾 → AR(p)
       - ACF q 阶截尾 + PACF 拖尾 → MA(q)
       - 两者都拖尾 → ARMA 或 ARIMA
    4. 用 AIC/BIC 准则选择最优 (p,d,q) 组合
    5. 残差白噪声检验（Ljung-Box 检验）

  formulas:
    - "ARIMA(p,d,q): φ(B)·(1-B)^d·y_t = θ(B)·ε_t"
    - "AR(1): y_t = c + φ·y_{t-1} + ε_t, |φ| < 1 保证平稳"
    - "MA(1): y_t = μ + ε_t + θ·ε_{t-1}"
    - "AIC = -2·ln(L) + 2k, BIC = -2·ln(L) + k·ln(n)"

  applicable_when:
    - "单变量时间序列，有 ≥ 30 个历史数据点（越多越好）"
    - "数据呈现一定的趋势或季节性（可通过差分处理）"
    - "外部影响因素数据不可得或难以量化"
    - "短期预测（预测期 < 样本期的 1/3）"
    - "数据缺失不多且无明显结构性突变"

  typical_scenarios:
    - "GDP/CPI 等经济指标的短期预测"
    - "销售额/用户数等业务指标的预测"
    - "气温/降雨量的气象预测"
    - "交通流量/电力负荷的短期预测"
    - "作为集成模型的 base learner，与机器学习模型组合"

  common_mistakes:
    - "跳过平稳性检验直接建模：不平稳序列用 ARIMA 效果极差"
    - "差分阶数过大导致过差分（d>2 很少需要）"
    - "仅凭 ACF/PACF 肉眼判断，未用 AIC 做模型选择"
    - "忽略残差自相关检验：残差不白噪声 → 模型拟合不充分"
    - "对有明显季节性的数据用普通 ARIMA：应用 SARIMA（加季节性参数）"

  code_snippets:
    - |
      # Python: statsmodels ARIMA 自动定阶
      import pandas as pd
      from statsmodels.tsa.arima.model import ARIMA
      from statsmodels.tsa.stattools import adfuller
      import pmdarima as pm

      def arima_forecast(series, forecast_steps=12):
          # 1. 平稳性检验
          p_value = adfuller(series.dropna())[1]
          d = 0 if p_value < 0.05 else 1  # 不平稳则一阶差分
          # 2. 自动定阶 (p,d,q)
          auto = pm.auto_arima(series, d=d, seasonal=False,
                               stepwise=True, suppress_warnings=True,
                               max_p=5, max_q=5)
          # 3. 拟合 + 预测
          model = ARIMA(series, order=auto.order)
          fitted = model.fit()
          forecast = fitted.forecast(steps=forecast_steps)
          return forecast, auto.order, fitted.summary()

  related_cards: ["mc_005", "mc_016"]
  difficulty: 3
  quality_rating: 5
  tags:
    model_type: ["预测与分类"]
    key_concepts: ["平稳性", "自相关", "差分", "白噪声"]
    mathematical_tools: ["时间序列", "统计检验", "信息准则"]
