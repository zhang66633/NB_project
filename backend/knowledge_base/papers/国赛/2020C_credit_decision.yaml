paper:
  id: "paper_004"
  year: 2020
  competition: "国赛"
  problem_id: "C"
  title: "中小微企业信贷决策模型"
  tags:
    problem_type: ["评价决策", "预测与分类"]
    core_models: ["逻辑回归", "随机森林", "TOPSIS", "层次分析法"]
    data_requirement: ["given_data"]
  difficulty: 3
  analysis:
    background: |
      银行需对一批中小微企业做出信贷决策。给定企业的进项/销项发票数据（含金额、时间、
      交易方），需评估企业信用风险，确定放贷策略（是否放贷、额度、利率、期限）。

    key_insights:
      - "发票数据是核心：企业的进销存数据反映了真实经营状况"
      - "问题分两阶段：信用评估(分类) → 信贷策略(决策优化)"
      - "需从发票中提取特征：交易频率、平均金额、交易集中度、季节性等"
      - "违约样本少（典型不平衡分类），需要特殊处理"

    decomposition:
      - name: "特征工程"
        description: "从原始发票数据中提取企业画像特征"
        sub_models: ["交易总额/笔数/频率", "进销比和利润估算", "交易方集中度(Herfindahl指数)", "时间序列特征(趋势/季节性)"]
      - name: "信用风险评估"
        description: "构建违约预测模型"
        sub_models: ["逻辑回归(可解释,作为baseline)", "随机森林(高准确率,特征重要性)", "SMOTE过采样处理样本不平衡"]
      - name: "信贷决策模型"
        description: "对信誉好的企业确定最优贷款方案"
        sub_models: ["客户分层(违约概率分段)", "风险定价(利率=基准+风险溢价)", "额度模型(基于年营业额)", "多目标TOPSIS综合评分"]
      - name: "模型验证与稳定性"
        description: "交叉验证和鲁棒性分析"
        sub_models: ["K折交叉验证", "ROC-AUC评估", "参数灵敏度分析"]

    solution_framework: |
      1. **数据清洗与特征提取**：发票去重→时间对齐→提取 20+ 个企业特征
      2. **违约预测**：SMOTE过采样平衡→逻辑回归+随机森林→概率输出 → ROC评估
      3. **客户分层**：按违约概率分 A/B/C 三档（优质/正常/高风险）
      4. **信贷策略**：A 档→高额度低利率；B 档→中等额度中等利率；C 档→拒贷或小额高利率
      5. **模型解释**：随机森林特征重要性分析，识别影响信用的关键因素

  model:
    methodology: |
      分两阶段建模：第一阶段用机器学习做信用评分，第二阶段用多指标评价做信贷决策。
      这样做的优势是解释性强——可以先看企业是否'值得贷'，再决定'怎么贷'。

    innovations:
      - "从发票中提取的企业特征设计巧妙（交易集中度、季节性指数等）"
      - "SMOTE+分类模型的组合有效处理了不平衡分类问题"
      - "两阶段解耦降低了复杂度：分类→评分→策略层次清晰"
      - "风险定价使利率与违约概率挂钩，经济含义合理"

    formulas:
      - "逻辑回归: P(违约) = 1 / (1 + exp(-(β₀ + Σβᵢxᵢ)))"
      - "信用评分: Score = 1000 - 200·log(P/(1-P)) / log(2)"
      - "利率定价: r = r_base + λ·P(违约)"
      - "TOPSIS 综合得分已在上文给出"

  evaluation:
    strengths:
      - "两阶段结构清晰，每个阶段都有明确的评价指标"
      - "特征工程有业务含义，不是盲目堆砌特征"
      - "模型可解释性好（逻辑回归+特征重要性）"
    weaknesses:
      - "发票数据可能包含噪声（虚开发票），未做异常检测"
      - "未考虑企业间的担保/关联关系（网络效应）"
      - "静态评估未考虑行业周期对还款能力的影响"
    improvement_ideas:
      - "构建企业关联网络，用图算法识别担保圈风险"
      - "加入宏观经济指标做动态调整"
      - "用贝叶斯优化调参替代网格搜索"

  takeaways:
    - "数据题的核心竞争力在特征工程——把原始数据变成有信息量的特征"
    - "不平衡分类的标准处理：过采样(SMOTE) + 合适的评估指标(AUC而非准确率)"
    - "两阶段模型是数据处理题的常用范式：先预测→再决策"
    - "结果解释比纯预测重要：银行需要知道为什么拒贷，而非只知道概率"
