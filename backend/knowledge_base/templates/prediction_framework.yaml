template:
  id: "tpl_prediction"
  name: "预测问题分析框架"
  applicable_to: ["prediction", "时间序列预测", "回归预测", "趋势分析"]

  steps:
    - step: 1
      name: "数据特征分析"
      guiding_questions:
        - "数据是时间序列还是横截面数据？"
        - "数据量有多大？数据质量如何？"
        - "是否存在明显的趋势/季节性/周期性？"
        - "预测的时间跨度是短期还是长期？"
      checklist:
        - "绘制时序图，观察趋势和异常点"
        - "计算自相关函数(ACF)和偏自相关函数(PACF)"
        - "检测数据的平稳性（单位根检验）"
        - "评估数据缺失情况和异常值"

    - step: 2
      name: "模型选择决策"
      decision_tree:
        - "大样本+无明显季节性 → ARIMA"
        - "有季节性 → SARIMA 或 Prophet"
        - "小样本(＜10个点)+指数趋势 → 灰色预测 GM(1,1)"
        - "多种影响因素 → 多元回归"
        - "复杂非线性关系 → 神经网络/随机森林/SVR"
        - "大样本+深度模式 → LSTM/Transformer"

    - step: 3
      name: "模型建立与训练"
      checklist:
        - "划分训练集和测试集（时序数据注意不能随机划分）"
        - "标准化/归一化处理"
        - "模型参数调优（交叉验证/网格搜索）"
        - "记录模型训练过程（损失曲线等）"

    - step: 4
      name: "评估与验证"
      guiding_questions:
        - "预测精度用什么指标衡量？（MAE/MAPE/RMSE/R²）"
        - "模型是否过拟合？"
        - "残差是否呈白噪声？"
        - "预测结果的经济/物理意义是否合理？"
      checklist:
        - "在测试集上计算评估指标"
        - "分析残差的自相关性"
        - "与基准模型（如朴素预测）对比"
  applicable_methods:
    - name: "ARIMA 时间序列"
      card_id: "mc_004"
      scenarios: "单变量时间序列，≥30个数据点，无明显季节性"
    - name: "灰色预测 GM(1,1)"
      card_id: "mc_005"
      scenarios: "小样本(4-10个点)，指数增长趋势"
    - name: "BP 神经网络"
      card_id: "mc_016"
      scenarios: "复杂非线性关系，大样本"
    - name: "SVM (SVR)"
      card_id: "mc_017"
      scenarios: "小样本高维，需要非线性回归"
    - name: "蒙特卡洛模拟"
      card_id: "mc_010"
      scenarios: "含随机因素的预测，如风险分析"
  quality_rating: 5
  tags:
    problem_type: ["预测类"]
    complexity: "composite"
    key_skills: ["时间序列分析", "平稳性检验", "模型评估"]
