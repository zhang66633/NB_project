problem:
  id: "prob_001"
  year: 2023
  competition: "国赛"
  problem_id: "C"
  title: "蔬菜类商品的自动定价与补货决策"
  full_text: |
    在生鲜超市中，蔬菜类商品的保鲜期较短，品相随销售时间增加而变差。
    超市通常采用动态定价策略和限时折扣来促进销售，同时需要根据历史销售数据
    制定合理的补货计划。

    请建立数学模型解决以下问题：
    问题1：分析蔬菜各品类及单品的销售量分布规律及相互关系。
    问题2：建立蔬菜品类的定价模型，给出各品类未来一周的日补货总量和定价策略。
    问题3：在满足最小陈列量要求的前提下，确定单品补货量和定价策略。
    问题4：收集更多数据，优化模型并给出改进建议。

    附件数据包括：某超市2019年1月至2022年12月的蔬菜销售流水明细数据。
  background: "生鲜超市蔬菜品类保鲜期短，需要动态定价和限时折扣来促进销售，同时根据历史数据制定合理补货计划。"
  objectives:
    - "分析蔬菜销售量分布规律及品类间相互关系"
    - "建立定价模型，给出各品类未来一周日补货总量和定价策略"
    - "确定单品补货量和定价策略"
    - "收集更多数据优化模型并给出改进建议"
  data_description: "某超市2019年1月至2022年12月蔬菜销售流水明细，包含销售日期、品类、单品、销量、售价、损耗率等字段。"
  deliverables:
    - "数学模型及求解代码"
    - "定价和补货策略方案"
    - "模型评价与改进建议"
  tags:
    problem_type: ["optimization", "prediction", "评价"]
    difficulty: "medium"
  linked_papers:
