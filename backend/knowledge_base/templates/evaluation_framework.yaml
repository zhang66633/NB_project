template:
  id: "tpl_003"
  name: "评价问题分析框架"
  name_en: "Evaluation Problem Analysis Framework"
  description: |
    当遇到评价/排名/选优类数学建模问题时，使用此框架进行结构化分析。
    适用于 AHP、TOPSIS、熵权法、模糊综合评价、DEA 等方法的组合使用。
  category: "evaluation"
  steps:
    - step: 1
      name: "明确评价目标与对象"
      action: "确定需要评价什么、评价谁、评价结果的用途（排序/分级/选优）"
      outputs: ["评价目的描述", "评价对象集合"]
    - step: 2
      name: "构建评价指标体系"
      action: |
        从文献调研和问题实际出发，选取合适的评价指标。
        指标应符合：代表性（反映核心特征）、独立性（避免冗余）、可量化（有数据来源）。
        区分正向指标（越大越好）和负向指标（越小越好）。
      outputs: ["指标列表(5-15个)", "正/负向标注", "数据来源说明"]
    - step: 3
      name: "数据预处理"
      action: |
        标准化/归一化消除量纲影响（正向指标用正向标准化，负向指标用负向标准化）。
        处理缺失值（插补/删除）。识别异常值。
      outputs: ["标准化数据矩阵 n×m", "处理说明"]
    - step: 4
      name: "确定权重方法"
      action: |
        根据数据特点选择赋权方法：
        - 有专家经验 → AHP 层次分析法（主观权重）
        - 有完整数据 → 熵权法（客观权重）
        - 两者都有 → 组合赋权（如 α*AHP + (1-α)*熵权）
        建议至少用两种方法交叉验证。
      outputs: ["权重向量", "赋权方法说明", "组合策略"]
    - step: 5
      name: "选择评价方法"
      action: |
        - 多对象排序 → TOPSIS / 灰色关联分析
        - 定性指标多 → 模糊综合评价
        - 多投入多产出效率 → DEA 数据包络分析
        - 指标间有层次结构 → AHP
        建议：用至少两种评价方法，比较结果一致性
      outputs: ["综合评价得分", "排序结果", "方法对比分析"]
    - step: 6
      name: "灵敏度分析"
      action: |
        检验排名对权重的敏感性：在每个指标的权重上增加/减少 5-10%，观察排名变化。
        如果微小权重变化导致大幅排名变动，则模型不够稳健，需重新审视指标和权重。
      outputs: ["灵敏度图表", "稳健性结论"]
    - step: 7
      name: "结果分析与建议"
      action: |
        分析排名靠前和靠后的对象的特征差异。
        对靠后的对象提供改进路径（对哪个指标做多少改进可提升多少排名）。
      outputs: ["差异化分析", "改进建议", "模型局限说明"]
  applicable_methods:
    - name: "AHP (层次分析法)"
      card_id: "mc_008"
      scenarios: "指标有层次结构，有专家打分"
    - name: "TOPSIS (理想解法)"
      card_id: "mc_009"
      scenarios: "多对象优劣排序，指标已量化"
    - name: "熵权法"
      card_id: "mc_013"
      scenarios: "纯数据驱动，无主观偏好"
    - name: "模糊综合评价"
      card_id: "mc_012"
      scenarios: "定性评价为主，结果需分级"
    - name: "DEA (数据包络分析)"
      card_id: "mc_019"
      scenarios: "多投入多产出效率评价"
    - name: "PCA (主成分分析)"
      card_id: "mc_014"
      scenarios: "指标多且相关，需降维"
  quality_rating: 5
  tags:
    problem_type: ["评价决策"]
    complexity: "composite"
    key_skills: ["指标构建", "赋权方法组合", "多方法交叉验证", "灵敏度分析"]
