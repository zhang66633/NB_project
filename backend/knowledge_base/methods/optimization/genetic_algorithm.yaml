method_card:
  id: "mc_003"
  name: "遗传算法 (Genetic Algorithm)"
  category: ["optimization", "启发式算法", "元启发式"]
  principle: |
    模拟自然选择和遗传机制的随机搜索优化算法。核心操作：选择(Selection)、交叉(Crossover)、变异(Mutation)。
    通过适应度函数(Fitness)评价个体质量，优胜劣汰迭代进化。
    本质是全局搜索，对目标函数的连续性和可导性无要求。
  applicable_when:
    - "目标函数非凸、不可导或存在多个局部最优"
    - "问题规模大，精确算法不可行"
    - "可以接受近似解而非精确最优"
  not_applicable_when:
    - "问题可用精确算法高效求解"
    - "对解的精度要求极高"
  common_mistakes:
    - mistake: "参数设置不当导致过早收敛"
      solution: "增大种群规模和变异率，使用自适应参数策略"
    - mistake: "约束处理不当导致大量不可行解"
      solution: "使用罚函数法或专门的约束处理算子"
  code_snippets:
    - language: "python"
      description: "使用 scipy 或 geatpy 实现遗传算法"
      code: |
        from scipy.optimize import differential_evolution
        result = differential_evolution(
            lambda x: (x[0]-2)**2 + (x[1]-3)**2,
            bounds=[(-10, 10), (-10, 10)],
            strategy='best1bin', maxiter=1000, popsize=30
        )
        print(f"最优解: {result.x}, 最优值: {result.fun}")
  formulas:
    - "适应度: f_i = fitness(chromosome_i)，目标函数越高(大)→适应度越高"
    - "轮盘赌选择概率: P_i = f_i / Σ f_j"
    - "交叉: offspring = α·parent1 + (1-α)·parent2 (实数编码) / 单点/双点交换 (二进制)"
    - "变异: x_new = x_old + N(0, σ) (高斯变异) / 位翻转 (二进制)"
  related_cards: ["mc_006", "mc_011", "mc_002"]
  difficulty: 3
  quality_rating: 5
  tags:
    model_type: ["最优化"]
    key_concepts: ["自然选择", "交叉变异", "适应度函数", "全局搜索"]
    mathematical_tools: ["随机过程", "概率论", "编码理论"]
