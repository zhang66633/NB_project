method_card:
  id: "mc_017"
  name: "支持向量机"
  name_en: "Support Vector Machine (SVM)"
  category: ["分类与聚类", "机器学习"]
  principle: |
    支持向量机是一种基于最大间隔的分类模型，通过寻找一个超平面将两类样本分开，
    使得分类间隔（margin）最大化。对于线性不可分的数据，通过核函数（Kernel）
    将数据映射到高维空间，在变换空间中寻找最优分类超平面。

    **线性 SVM**：求解带约束的二次规划问题
    min (1/2)||w||^2 + C·Σ ξ_i
    s.t.  y_i(w^T·x_i + b) ≥ 1 - ξ_i, ξ_i ≥ 0

    其中 ξ_i 为松弛变量（允许软间隔），C 为惩罚系数（平衡间隔宽度和误分类）。

    **常见核函数**：
    - 线性核：K(x,z) = x^T·z（数据线性可分时用）
    - 多项式核：K(x,z) = (γ·x^T·z + r)^d
    - RBF 高斯核：K(x,z) = exp(-γ·||x-z||^2)（最常用，适用于大多数非线性问题）
    - Sigmoid 核：K(x,z) = tanh(γ·x^T·z + r)

    **SVR**（支持向量回归）：SVM 的回归变体，引入 ε-不敏感损失函数。

  formulas:
    - "对偶问题：max Σα_i - (1/2)ΣΣα_i·α_j·y_i·y_j·K(x_i,x_j)"
    - "决策函数：f(x) = sign(Σ α_i·y_i·K(x_i,x) + b)"
    - "RBF 核：K(x,z) = exp(-γ·||x-z||^2)"

  applicable_when:
    - "二分类或多分类问题（通过一对多/一对一策略扩展到多类）"
    - "数据维度高但样本量不大（SVM 对小样本效果好）"
    - "数据存在清晰边界（SVM 对噪声鲁棒但对边界模糊的数据效果差）"
    - "需要非线性决策边界（选择 RBF 核）"

  typical_scenarios:
    - "文本/邮件分类：垃圾邮件检测、情感分析"
    - "图像识别：手写数字识别、人脸检测"
    - "故障/异常检测：工业设备故障预测"
    - "数值预测：SVR 用于股票价格、电力负荷预测"
    - "多指标分类：疾病诊断、信用评分"

  common_mistakes:
    - "未做数据标准化：SVM 对特征尺度敏感，必须 z-score 标准化"
    - "默认使用线性核不验证；尝试 RBF 核调参获得更好效果"
    - "C 和 γ 设置不当：C 过大过拟合，C 过小欠拟合；用网格搜索调优"
    - "样本不平衡时直接训练；采用类别加权或 SMOTE 过采样"

  code_snippets:
    - |
      # Python: sklearn SVM 示例
      from sklearn.svm import SVC, SVR
      from sklearn.preprocessing import StandardScaler
      from sklearn.model_selection import GridSearchCV

      def svm_classify(X_train, y_train, X_test):
          scaler = StandardScaler()
          X_train_s = scaler.fit_transform(X_train)
          X_test_s = scaler.transform(X_test)
          # 网格搜索调参
          params = {'C': [0.1, 1, 10], 'gamma': [0.01, 0.1, 1]}
          svm = GridSearchCV(SVC(kernel='rbf'), params, cv=5)
          svm.fit(X_train_s, y_train)
          return svm.predict(X_test_s), svm.best_params_

  related_cards: ["mc_016", "mc_015"]
  difficulty: 3
  quality_rating: 5
  tags:
    model_type: ["分类与聚类"]
    key_concepts: ["最大间隔", "核函数", "对偶问题", "支持向量"]
    mathematical_tools: ["凸优化", "内积空间", "拉格朗日乘子"]
